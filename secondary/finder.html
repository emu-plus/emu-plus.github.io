                                <div class="w-full md:w-1/2">
                                    <div class="flex flex-wrap gap-1 mb-2">
                                        ${g.evidence.map(e => `<span class="px-2 py-0.5 rounded text-[9px] font-black uppercase ${selectedEv.includes(e) ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500'}">${e}</span>`).join('')}
                                        ${isMimicOrb ? '<span class="px-2 py-0.5 rounded text-[9px] font-black bg-pink-600 text-white italic">ゴーストオーブ (偽)</span>' : ''}
                                    </div>
                                </div>
                                <div class="w-full md:w-1/2 bg-slate-950 p-4 rounded-2xl border border-slate-800 text-[10px] space-y-1.5 font-mono">
                                    <div class="flex"><span class="w-24 text-slate-500 font-bold shrink-0">確定証拠 :</span><span class="${forcedColor}">${g.forced}</span></div>
                                    <div class="flex"><span class="w-24 text-slate-500 font-bold shrink-0">ハント開始 :</span><span class="text-slate-200">${hStr}</span></div>
                                    <div class="flex"><span class="w-24 text-slate-500 font-bold shrink-0">移動速度 :</span><span class="text-slate-200">${sStr}</span><span class="${g.hasAccel === false ? 'text-blue-400' : 'text-slate-200'}">${g.hasAccel === true ? '視認加速あり' : (g.hasAccel === 'partial' ? '通常速度のみあり' : '視認加速なし')}</span></div>
                                </div>
                            </div>
                            <div class="bg-slate-800/20 p-4 rounded-2xl border border-slate-800/50 text-[11px] text-slate-400 italic font-medium">
                                ${formattedNote}
                            </div>
                        </div>
                    </div>`;
                display.appendChild(card);
            });
            
            if (filtered.length === 0) {
                display.innerHTML = `
                    <div class="text-center py-20 bg-slate-900/50 border-2 border-dashed border-slate-800 rounded-3xl">
                        <div class="text-2xl mb-4">👻</div>
                        <div class="text-slate-500 text-sm font-medium">条件に一致するゴーストはいません。</div>
                    </div>`;
            }
            
            updateResetButtonAppearance();
            syncUIState();
            saveState();
        }
        
        function toggleExclude(id) {
            if (excludedIds.has(id)) excludedIds.delete(id);
            else excludedIds.add(id);
            
            saveState();
            render();
        }
        
        function saveState() {
            const state = {
                selectedEv,
                excludedEvidence,
                currentSpeedFilter,
                isHuntLocked,
                isSpeedLocked,
                excludedIds: Array.from(excludedIds),
                // スライダーの値を保存
                huntValue: parseInt(document.getElementById('hunt-slider').value),
                specialHunt: document.getElementById('special-hunt').checked,
                noAccelChecked: document.getElementById('no-acceleration').checked
            };
            localStorage.setItem('phasmo-terminal-state', JSON.stringify(state));
        }
        
        function loadState() {
            const saved = localStorage.getItem('phasmo-terminal-state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    selectedEv = parsed.selectedEv || [];
                    excludedEvidence = parsed.excludedEvidence || [];
                    currentSpeedFilter = parsed.currentSpeedFilter || null;
                    isHuntLocked = parsed.isHuntLocked !== undefined ? parsed.isHuntLocked : true;
                    isSpeedLocked = parsed.isSpeedLocked !== undefined ? parsed.isSpeedLocked : true;
                    excludedIds = new Set(parsed.excludedIds || []);
                    
                   const slider = document.getElementById('hunt-slider');
                    // 保存された値をスライダーに反映
                    if (parsed.huntValue !== undefined) {
                        slider.value = parsed.huntValue;
                    } else {
                        slider.value = 0;
                    }
                    // 数値表示(0%)を更新
                    document.getElementById('hunt-val').innerText = `${slider.value}%`;
                    
                    document.getElementById('special-hunt').checked = parsed.specialHunt || false;
                    document.getElementById('no-acceleration').checked = parsed.noAccelChecked || false;
                } catch (e) {
                    console.error("セーブデータの読み込みに失敗しました", e);
                }
            }
        }
        
        function resetAll() {
            selectedEv = [];
            excludedEvidence = [];
            excludedIds.clear();
            currentSpeedFilter = null;
            
            isHuntLocked = true;
            const slider = document.getElementById('hunt-slider');
            slider.value = 0;
            slider.disabled = true;
            
            const huntIcon = document.getElementById('lock-icon');
            const huntBtn = document.getElementById('lock-btn');
            huntIcon.innerHTML = '<path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />';
            huntIcon.classList.add('text-amber-500');
            huntIcon.classList.remove('text-green-500');
            huntBtn.className = "p-1 rounded bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors";
            
            isSpeedLocked = true;
            const speedIcon = document.getElementById('speed-lock-icon');
            const speedBtn = document.getElementById('speed-lock-btn');
            speedIcon.innerHTML = '<path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />';
            speedIcon.classList.add('text-amber-500');
            speedIcon.classList.remove('text-green-500');
            speedBtn.className = "p-1 rounded bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-colors";
            
            document.getElementById('special-hunt').checked = false;
            document.getElementById('no-acceleration').checked = false;
            
            updateSpeedButtons();
            updateFilters();
            
            saveState();
        }
        
        loadState();
        render();
    </script>
</body>
</html>
